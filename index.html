<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Rapaseos AI · Quantum Live</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://accounts.google.com/gsi/client"></script>
    <style>
        /* ========== CHAT PREMIUM (CODE 1) GIỮ NGUYÊN 100% ========== */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: #070B1F; color: #E6E8FF; display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
        
        header { background: #0F1430; padding: 20px 20px 5px 20px; border-bottom: 1px solid rgba(124, 77, 255, 0.2); z-index: 100; flex-shrink: 0; text-align: center; position: relative; }
        .logo-container { width: 100%; max-width: 500px; margin: 0 auto; pointer-events: none; }
        .logoText { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 900; font-size: 144px; fill: url(#grad); filter: drop-shadow(0 0 15px rgba(124, 77, 255, 0.4)); }

        .switch-container { position: relative; max-width: 450px; margin: -30px auto 10px auto; z-index: 110; }
        .main-tabs { display: flex; background: #111632; padding: 6px; border-radius: 16px; gap: 6px; border: 1px solid rgba(124, 77, 255, 0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .tab-btn { flex: 1; border: none; background: transparent; padding: 12px 2px; border-radius: 12px; font-size: 13px; font-weight: 900; color: #A0A8D8; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); display: flex; align-items: center; justify-content: center; gap: 4px; }
        
        .tab-btn.active.gii { background: linear-gradient(135deg, #FF6EC7, #C2187A); color: white; box-shadow: 0 0 15px rgba(255, 110, 199, 0.4); }
        .tab-btn.active.lmetal { background: linear-gradient(135deg, #00D4FF, #2563EB); color: #0B1220; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
        .tab-btn.active.cyh { background: linear-gradient(135deg, #7C4DFF, #4B2ABF); color: white; box-shadow: 0 0 15px rgba(124, 77, 255, 0.5); }

        .tab-btn .chevron-icon { display: none; width: 14px; height: 14px; transition: transform 0.3s; pointer-events: none; }
        .tab-btn.active .chevron-icon { display: inline-block; }
        .tab-btn.active.menu-open .chevron-icon { transform: rotate(180deg); }

        .dropdown-menu { position: absolute; top: calc(100% + 10px); left: 0; right: 0; background: #111632; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid rgba(124, 77, 255, 0.25); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: 120; overflow: hidden; backdrop-filter: blur(10px); }
        .dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
        
        .drop-item { padding: 16px 20px; border-bottom: 1px solid rgba(124, 77, 255, 0.1); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .drop-item:last-child { border-bottom: none; }
        .drop-item:active, .drop-item:hover { background: #1A2145; }
        
        .item-info { display: flex; flex-direction: column; align-items: flex-start; text-align: left; pointer-events: none; }
        .item-title { font-size: 15px; font-weight: 800; color: #E6E8FF; margin-bottom: 3px; transition: color 0.3s; }
        .item-sub { font-size: 12px; color: #A0A8D8; font-weight: 500; }
        
        .gii-menu .drop-item.selected .item-title { color: #FF6EC7; }
        .lmetal-menu .drop-item.selected .item-title { color: #00D4FF; }
        .cyh-menu .drop-item.selected .item-title { color: #7C4DFF; }

        main { flex: 1; overflow-y: auto; padding: 20px 15px; scroll-behavior: smooth; background: #070B1F; z-index: 10; position: relative; }
        .chat-container { width: 100%; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }
        
        .msg-row { display: flex; gap: 12px; max-width: 90%; align-items: flex-start; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

        .chat-avatar { width: 70px; height: auto; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: transparent; border: none; box-shadow: none; padding: 2px; transition: 0.3s; }
        .chat-avatar svg { width: 100%; height: auto; filter: drop-shadow(0 0 12px rgba(124, 77, 255, 0.6)); }

        .bubble { padding: 15px 20px; border-radius: 20px; font-size: 16px; line-height: 1.6; word-wrap: break-word; position: relative; }
        
        .user .bubble { background: linear-gradient(135deg, #7C4DFF 0%, #00D4FF 100%); color: #FFFFFF; border-bottom-right-radius: 4px; box-shadow: 0 4px 20px rgba(124, 77, 255, 0.4); font-weight: 500; }
        .bot .bubble { background: linear-gradient(145deg, #141A3A 0%, #1B214A 100%); color: #E6E8FF; border-bottom-left-radius: 4px; border: 1px solid rgba(124, 77, 255, 0.25); box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4); }

        .btn-group-chat { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .speak-btn { background: rgba(124, 77, 255, 0.1); border: 1px solid rgba(124, 77, 255, 0.3); color: #A0A8D8; padding: 8px 14px; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.3s; }
        .speak-btn:hover, .speak-btn.playing { background: #7C4DFF; color: white; border-color: #7C4DFF; box-shadow: 0 0 15px rgba(124, 77, 255, 0.5); }
        .speak-btn.error { background: rgba(255, 59, 107, 0.1); color: #FF3B6B; border-color: #FF3B6B; }

        .thinking-row { display: none; align-items: center; gap: 12px; margin-top: 5px; }
        .thinking-row.active { display: flex; }
        .scene-rings { width: 68px; height: 68px; display: flex; align-items: center; justify-content: center; position: relative; }
        .ring { position: absolute; border-radius: 50%; border: 3px solid transparent; }
        .ring-outer { width: 64px; height: 64px; background: linear-gradient(#050510, #050510) padding-box, conic-gradient(from 0deg, #7C4DFF, #00D4FF, #FF6EC7, #7C4DFF) border-box; animation: spinLeft 2s linear infinite; filter: drop-shadow(0 0 8px rgba(124, 77, 255, 0.6)); }
        .ring-inner { width: 42px; height: 42px; background: linear-gradient(#050510, #050510) padding-box, conic-gradient(from 0deg, #FF6EC7, #00D4FF, #7C4DFF, #FF6EC7) border-box; animation: spinRight 1.5s linear infinite; filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.6)); }
        
        @keyframes spinLeft { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        @keyframes spinRight { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .input-area { background: #0F1430; padding: 15px; border-top: 1px solid rgba(124, 77, 255, 0.2); z-index: 50; }
        .input-bar { display: flex; align-items: flex-end; gap: 10px; max-width: 800px; margin: 0 auto; background: #121735; padding: 12px 12px 12px 20px; border-radius: 24px; border: 1px solid rgba(124, 77, 255, 0.25); transition: 0.3s; }
        .input-bar:focus-within { box-shadow: 0 0 0 2px rgba(124, 77, 255, 0.6); }
        textarea { flex: 1; background: transparent; border: none; outline: none; padding: 8px 0; font-size: 16px; font-family: inherit; resize: none; max-height: 150px; color: #E6E8FF; line-height: 1.5; }
        textarea::placeholder { color: #7F8ACF; }
        
        .action-btn { width: 46px; height: 46px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); flex-shrink: 0; }
        .btn-send { background: linear-gradient(135deg, #7C4DFF 0%, #00D4FF 100%); color: #FFFFFF; box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4); }
        .btn-send:hover:not(:disabled) { transform: scale(0.95); }
        .btn-send:disabled { background: #1A2145; color: #4B5563; box-shadow: none; cursor: not-allowed; }

        #overlay { position: fixed; inset: 0; background: rgba(7, 11, 31, 0.7); z-index: 90; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(5px); }
        #overlay.show { opacity: 1; visibility: visible; }

        /* ========== QUANTUM LIVE OVERLAY (CODE 2) - ĐƯỢC BỌC TRONG #live-quantum-overlay ========== */
        #live-quantum-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
            background: #0b0f19;
            display: none; /* Ẩn mặc định */
            overflow: hidden;
        }
        #live-quantum-overlay #canvas-aurora,
        #live-quantum-overlay #canvas-stars,
        #live-quantum-overlay .overlay,
        #live-quantum-overlay .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        #live-quantum-overlay .overlay {
            background: linear-gradient(to bottom, #0b0f19 35%, transparent 75%);
            pointer-events: none;
            z-index: 2;
        }
        #live-quantum-overlay #canvas-aurora {
            filter: blur(40px);
            mix-blend-mode: screen;
            z-index: 1;
        }
        #live-quantum-overlay #canvas-stars {
            z-index: 3;
            pointer-events: none;
        }
        #live-quantum-overlay .ui-layer {
            z-index: 10;
            pointer-events: none;
        }
        #live-quantum-overlay .logo-container {
            position: absolute;
            top: 2vh;
            left: 50%;
            transform: translateX(-50%) scale(0.4);
            transform-origin: top center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #live-quantum-overlay .logo-svg {
            width: 120px;
            height: 120px;
            filter: drop-shadow(0 0 10px rgba(150, 50, 255, 0.2));
        }
        #live-quantum-overlay .text-live {
            font-size: 3.5rem;
            font-weight: 500;
            letter-spacing: -2px;
            margin-left: -10px;
            margin-top: 50px;
            background: linear-gradient(90deg, #5b86e5 0%, #a252ff 50%, #ff6b9d 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 15px rgba(162, 82, 255, 0.3);
        }
        #live-quantum-overlay .btn-wrapper {
            position: absolute;
            bottom: 5vh;
            right: 5vw;
            pointer-events: auto;
            transform: scale(0.5);
            transform-origin: bottom right;
        }
        #live-quantum-overlay .btn-close {
            position: relative;
            width: 200px;
            height: 90px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            background: linear-gradient(145deg, #ffcc00, #ff8800, #ff4400);
            box-shadow: 0 0 20px 6px rgba(255, 160, 0, 0.7), 0 0 50px 15px rgba(255, 100, 0, 0.4), 0 0 90px 30px rgba(255, 60, 0, 0.2), inset 0 2px 6px rgba(255, 255, 200, 0.3), inset 0 -3px 8px rgba(180, 50, 0, 0.4);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
            outline: none;
        }
        #live-quantum-overlay .btn-close::before {
            content: '';
            position: absolute;
            inset: 3px;
            border-radius: 46px;
            background: linear-gradient(160deg, rgba(255,220,80,0.25) 0%, transparent 60%);
            pointer-events: none;
        }
        #live-quantum-overlay .btn-close .x-icon {
            position: relative;
            width: 46px;
            height: 46px;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #live-quantum-overlay .btn-close .x-icon::before,
        #live-quantum-overlay .btn-close .x-icon::after {
            content: '';
            position: absolute;
            width: 46px;
            height: 9px;
            background: #fff;
            border-radius: 6px;
            box-shadow: 0 0 8px rgba(255,255,255,0.6);
        }
        #live-quantum-overlay .btn-close .x-icon::before { transform: rotate(45deg); }
        #live-quantum-overlay .btn-close .x-icon::after { transform: rotate(-45deg); }
        #live-quantum-overlay .btn-close:hover {
            transform: scale(1.05);
            box-shadow: 0 0 28px 10px rgba(255, 180, 0, 0.85), 0 0 70px 22px rgba(255, 120, 0, 0.55), 0 0 120px 40px rgba(255, 60, 0, 0.3), inset 0 2px 6px rgba(255, 255, 200, 0.35), inset 0 -3px 8px rgba(180, 50, 0, 0.4);
        }
        #live-quantum-overlay .btn-close:active {
            transform: scale(0.97);
            box-shadow: 0 0 14px 4px rgba(255, 160, 0, 0.6), 0 0 35px 10px rgba(255, 100, 0, 0.35), inset 0 2px 6px rgba(255, 255, 200, 0.3), inset 0 -3px 8px rgba(180, 50, 0, 0.4);
        }
        /* ===== WRAPPER CHAT HIỆN MẶC ĐỊNH ===== */
        #app-main-wrapper {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100%;
        }
    </style>
</head>
<body>
    <!-- ========== CHAT PREMIUM (CODE 1) ========== -->
    <div id="app-main-wrapper">

        function saveAuthToken(token, expiresInSec) {
            const expireTime = Date.now() + (expiresInSec * 1000) - 60000;
            localStorage.setItem('g_access_token', token);
            localStorage.setItem('g_expire_time', expireTime);
            accessToken = token;
        }

        function loadAuthToken() {
            const token = localStorage.getItem('g_access_token');
            const expire = localStorage.getItem('g_expire_time');
            if (token && expire && Date.now() < parseInt(expire)) return token;
            clearAuthToken(); return null;
        }

        function clearAuthToken() {
            localStorage.removeItem('g_access_token');
            localStorage.removeItem('g_expire_time');
            accessToken = null;
        }

        // ========== QUANTUM LIVE (CODE 2) - HIỆU ỨNG CANVAS ==========
        (function initLiveCanvas() {
            // MÂY AURORA TÍM XANH
            const cAurora = document.getElementById('canvas-aurora');
            const ctxA = cAurora.getContext('2d');
            let wA, hA;
            function resizeAurora() {
                wA = cAurora.width = window.innerWidth;
                hA = cAurora.height = window.innerHeight; 
            }
            window.addEventListener('resize', resizeAurora);
            resizeAurora();

            let timeA = 0;
            function animateAurora() {
                ctxA.clearRect(0, 0, wA, hA); 
                ctxA.globalCompositeOperation = 'lighter'; 
                
                const gradient = ctxA.createLinearGradient(0, 0, wA, 0);
                gradient.addColorStop(0, 'rgba(160, 70, 255, 0.8)');   
                gradient.addColorStop(0.35, 'rgba(30, 130, 255, 0.9)'); 
                gradient.addColorStop(0.7, 'rgba(0, 210, 255, 0.85)');  
                gradient.addColorStop(1, 'rgba(120, 255, 255, 0.8)');   

                const waves = [
                    { amp: hA * 0.22, freq: 0.0015, speed: 0.012, offset: hA * 0.25 },
                    { amp: hA * 0.18, freq: 0.002,  speed: 0.018, offset: hA * 0.30 },
                    { amp: hA * 0.25, freq: 0.001,  speed: 0.008, offset: hA * 0.20 },
                    { amp: hA * 0.15, freq: 0.003,  speed: 0.02,  offset: hA * 0.28 }
                ];

                waves.forEach((wave, index) => {
                    ctxA.beginPath();
                    ctxA.moveTo(0, hA); 
                    for (let x = 0; x <= wA; x += 15) {
                        let y = hA - wave.offset - Math.sin(x * wave.freq + timeA * wave.speed + index * 2) * wave.amp;
                        ctxA.lineTo(x, y);
                    }
                    ctxA.lineTo(wA, hA); 
                    ctxA.closePath();
                    ctxA.fillStyle = gradient;
                    ctxA.fill(); 
                });
                timeA++;
                requestAnimationFrame(animateAurora);
            }
            animateAurora();

            // SAO VÔ CỰC TRÊN CAO
            const cStars = document.getElementById('canvas-stars');
            const ctxS = cStars.getContext('2d');
            let wS, hS, cx, cy, rx, ry;

            function resizeStars() {
                wS = cStars.width = window.innerWidth;
                hS = cStars.height = window.innerHeight;
                cx = wS / 2;
                cy = hS * 0.25; 
                rx = Math.min(wS * 0.35, 350);
                ry = Math.min(hS * 0.15, 120); 
            }
            window.addEventListener('resize', resizeStars);
            resizeStars();

            class Star {
                constructor() {
                    this.t = Math.random() * Math.PI * 2; 
                    this.speed = 0.001 + Math.random() * 0.003; 
                    this.rxOff = (Math.random() - 0.5) * rx * 0.4; 
                    this.ryOff = (Math.random() - 0.5) * ry * 0.4;
                    this.size = Math.random() * 1.5 + 0.5; 
                    this.alpha = 0.4 + Math.random() * 0.6; 
                }
                update() {
                    this.t += this.speed;
                    const denom = 1 + Math.sin(this.t) * Math.sin(this.t);
                    const rx2 = rx + this.rxOff;
                    const ry2 = ry + this.ryOff;
                    this.x = cx + rx2 * Math.cos(this.t) / denom;
                    this.y = cy + ry2 * Math.sin(this.t) * Math.cos(this.t) / denom;
                }
                draw() {
                    let ratio = (this.x - (cx - rx)) / (2 * rx);
                    ratio = Math.max(0, Math.min(1, ratio)); 
                    const hue = 210 + ratio * 70; 
                    ctxS.fillStyle = `hsla(${hue}, 100%, 65%, ${this.alpha})`;
                    ctxS.fillRect(this.x, this.y, this.size, this.size); 
                }
            }

            const STAR_COUNT = 4000; 
            const stars = [];
            for (let i = 0; i < STAR_COUNT; i++) {
                stars.push(new Star());
            }

            function animateStars() {
                ctxS.globalCompositeOperation = 'destination-out';
                ctxS.fillStyle = 'rgba(0, 0, 0, 0.1)'; 
                ctxS.fillRect(0, 0, wS, hS);

                ctxS.globalCompositeOperation = 'lighter'; 
                for (let i = 0; i < stars.length; i++) {
                    stars[i].update();
                    stars[i].draw();
                }
                requestAnimationFrame(animateStars);
            }
            animateStars();
        })();

        // ========== LOGIC LIVE VOICE ĐÃ SỬA LỖI ==========
        let liveRecognition = null;
        let isLiveActive = false;
        let liveAudioContext = null;
        let liveMessages = [];
        let isAiSpeaking = false;          // Cờ chống tự kỷ

        // Hàm mở khóa âm thanh (gọi ngay khi click)
        function unlockAudioAndSpeech() {
            // Web Audio API
            if (!liveAudioContext) {
                liveAudioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (liveAudioContext.state === 'suspended') {
                liveAudioContext.resume();
            }
            // SpeechSynthesis: phát một khoảng lặng để lấy quyền
            const silentUtterance = new SpeechSynthesisUtterance(' ');
            silentUtterance.volume = 0;
            window.speechSynthesis.speak(silentUtterance);
        }

        function startLive() {
            isLiveActive = true;
            document.getElementById('app-main-wrapper').style.display = 'none';
            document.getElementById('live-quantum-overlay').style.display = 'block';
            unlockAudioAndSpeech();                 // Mở khóa ngay khi click
            startListening();
        }

        function stopLive() {
            isLiveActive = false;
            if (liveRecognition) {
                liveRecognition.stop();
                liveRecognition = null;
            }
            window.speechSynthesis.cancel();
            document.getElementById('live-quantum-overlay').style.display = 'none';
            document.getElementById('app-main-wrapper').style.display = 'flex';
            liveMessages = [];
        }

        function startListening() {
            if (!isLiveActive || isAiSpeaking) return;  // Không bật mic khi AI đang nói
            if (!('webkitSpeechRecognition' in window)) {
                alert('Trình duyệt không hỗ trợ nhận diện giọng nói.');
                return;
            }
            if (liveRecognition) {
                try { liveRecognition.stop(); } catch (e) {}
                liveRecognition = null;
            }
            liveRecognition = new webkitSpeechRecognition();
            liveRecognition.lang = 'vi-VN';
            liveRecognition.continuous = false;
            liveRecognition.interimResults = false;

            liveRecognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                processVoiceInput(transcript);
            };

            liveRecognition.onerror = (event) => {
                console.error('Speech error', event.error);
                if (isLiveActive && event.error !== 'aborted') {
                    setTimeout(startListening, 1000);
                }
            };

            liveRecognition.onend = () => {
                // Chỉ bật lại mic nếu live còn active và AI không đang nói
                if (isLiveActive && !isAiSpeaking) {
                    setTimeout(startListening, 300);
                }
            };

            try {
                liveRecognition.start();
            } catch (e) {
                console.warn('recognition start failed', e);
            }
        }

        // Giữ lửa audio trước khi gọi API
        function keepAudioAlive() {
            const silent = new SpeechSynthesisUtterance(' ');
            silent.volume = 0;
            window.speechSynthesis.speak(silent);
        }

        async function processVoiceInput(text) {
            if (!isLiveActive) return;
            liveMessages.push({ role: 'user', content: text });

            // Giữ lửa audio ngay trước khi gọi API
            keepAudioAlive();

            try {
                const responseText = await callLiveAPI(text);
                liveMessages.push({ role: 'assistant', content: responseText });
                speakLiveText(responseText);
            } catch (err) {
                speakLiveText('Có lỗi xảy ra, vui lòng thử lại.');
            }
        }

        async function callLiveAPI(userText) {
            // Thiết quân luật: cực ngắn, không emoji
            const systemCommand = " Tuyệt đối không dùng emoji, trả lời cực ngắn gọn (tối đa 2 câu).";

            if (activeProvider === 'gii') {
                const res = await fetchWithTimeout(`https://generativelanguage.googleapis.com/v1beta/models/${state.gii.id}:generateContent?key=${GOOGLE_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: "Bạn là Mị, AI của Rapaseos. Gọi người dùng là Tử Tử. Hãy trả lời thật vui vẻ, hài hước, phóng khoáng, tự nhiên." + systemCommand + "\n\n" + userText }] }] })
                });
                const d = await res.json();
                return d?.candidates?.[0]?.content?.parts?.[0]?.text || 'Xin lỗi, tôi không có câu trả lời.';
            } else if (activeProvider === 'lmetal') {
                const res = await fetchWithTimeout("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: state.lmetal.id,
                        messages: [
                            { role: "system", content: "Bạn là Mị, AI của Rapaseos. Gọi người dùng là Tử Tử. Hãy trả lời thật vui vẻ, hài hước, phóng khoáng, tự nhiên." + systemCommand },
                            { role: "user", content: userText }
                        ]
                    })
                });
                const d = await res.json();
                return d?.choices?.[0]?.message?.content || 'Xin lỗi, tôi không có câu trả lời.';
            } else if (activeProvider === 'cyh') {
                const res = await fetchWithTimeout("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: state.cyh.id,
                        messages: [
                            { role: "system", content: CYH_PROMPT + " Tuyệt đối không dùng emoji, trả lời cực ngắn (tối đa 2 câu)." },
                            { role: "user", content: userText }
                        ]
                    })
                });
                const d = await res.json();
                return d?.choices?.[0]?.message?.content || 'Xin lỗi, tôi không có câu trả lời.';
            }
        }

        function speakLiveText(text) {
            if (!isLiveActive) return;
            window.speechSynthesis.cancel();

            isAiSpeaking = true;   // Bắt đầu nói -> cấm mic

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'vi-VN';       // Không tìm voice, để trình duyệt tự chọn
            utterance.rate = 1.25;

            utterance.onend = () => {
                isAiSpeaking = false;        // Nói xong
                if (isLiveActive) {
                    startListening();         // Bật mic lại sau 300ms (onend tự gọi)
                }
            };

            utterance.onerror = () => {
                isAiSpeaking = false;
                if (isLiveActive) {
                    startListening();
                }
            };

            window.speechSynthesis.speak(utterance);
        }

        // Gắn sự kiện cho nút mic và nút X
        document.getElementById('btn-mic').addEventListener('click', startLive);
        document.getElementById('live-close-btn').addEventListener('click', stopLive);
    </script>
</body>
</html>
