<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="referrer" content="no-referrer">
    <title>Rapaseos AI - V6.6 Premium Perfection</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- ☁️ ĐÃ FIX: Bỏ 'async defer' để bắt buộc điện thoại tải xong Google mới chạy web, chống lỗi câm nút -->
    <script src="https://accounts.google.com/gsi/client"></script>

    <style>
        /* === TỔNG QUAN HỆ THỐNG - GIAO DIỆN PREMIUM CAO CẤP === */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { background-color: #070B1F; color: #E6E8FF; display: flex; flex-direction: column; height: 100vh; height: 100dvh; overflow: hidden; }
        
        header { background: #0F1430; padding: 20px 20px 5px 20px; border-bottom: 1px solid rgba(124, 77, 255, 0.2); z-index: 100; flex-shrink: 0; text-align: center; position: relative; }
        .logo-container { width: 100%; max-width: 500px; margin: 0 auto; pointer-events: none; }
        .logoText { font-family: 'Segoe UI', Arial, sans-serif; font-weight: 900; font-size: 144px; fill: url(#grad); filter: drop-shadow(0 0 15px rgba(124, 77, 255, 0.4)); }

        .switch-container { position: relative; max-width: 450px; margin: -30px auto 10px auto; z-index: 110; }
        .main-tabs { display: flex; background: #111632; padding: 6px; border-radius: 16px; gap: 6px; border: 1px solid rgba(124, 77, 255, 0.2); box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        
        .tab-btn { flex: 1; border: none; background: transparent; padding: 12px 2px; border-radius: 12px; font-size: 13px; font-weight: 900; color: #A0A8D8; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); display: flex; align-items: center; justify-content: center; gap: 4px; }
        
        .tab-btn.active.gii { background: linear-gradient(135deg, #FF6EC7, #C2187A); color: white; box-shadow: 0 0 15px rgba(255, 110, 199, 0.4); }
        .tab-btn.active.lmetal { background: linear-gradient(135deg, #00D4FF, #2563EB); color: #0B1220; box-shadow: 0 0 15px rgba(0, 212, 255, 0.4); }
        .tab-btn.active.cyh { background: linear-gradient(135deg, #7C4DFF, #4B2ABF); color: white; box-shadow: 0 0 15px rgba(124, 77, 255, 0.5); }

        .tab-btn .chevron-icon { display: none; width: 14px; height: 14px; transition: transform 0.3s; pointer-events: none; }
        .tab-btn.active .chevron-icon { display: inline-block; }
        .tab-btn.active.menu-open .chevron-icon { transform: rotate(180deg); }

        .dropdown-menu { position: absolute; top: calc(100% + 10px); left: 0; right: 0; background: #111632; border-radius: 16px; box-shadow: 0 15px 40px rgba(0,0,0,0.8); border: 1px solid rgba(124, 77, 255, 0.25); opacity: 0; visibility: hidden; transform: translateY(-10px); transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); z-index: 120; overflow: hidden; backdrop-filter: blur(10px); }
        .dropdown-menu.show { opacity: 1; visibility: visible; transform: translateY(0); }
        
        .drop-item { padding: 16px 20px; border-bottom: 1px solid rgba(124, 77, 255, 0.1); cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: background 0.2s; }
        .drop-item:last-child { border-bottom: none; }
        .drop-item:active, .drop-item:hover { background: #1A2145; }
        
        .item-info { display: flex; flex-direction: column; align-items: flex-start; text-align: left; pointer-events: none; }
        .item-title { font-size: 15px; font-weight: 800; color: #E6E8FF; margin-bottom: 3px; transition: color 0.3s; }
        .item-sub { font-size: 12px; color: #A0A8D8; font-weight: 500; }
        
        .gii-menu .drop-item.selected .item-title { color: #FF6EC7; }
        .lmetal-menu .drop-item.selected .item-title { color: #00D4FF; }
        .cyh-menu .drop-item.selected .item-title { color: #7C4DFF; }

        main { flex: 1; overflow-y: auto; padding: 20px 15px; scroll-behavior: smooth; background: #070B1F; z-index: 10; position: relative; }
        .chat-container { width: 100%; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 40px; }
        
        .msg-row { display: flex; gap: 12px; max-width: 90%; align-items: flex-start; }
        .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }

        .chat-avatar { width: 70px; height: auto; flex-shrink: 0; display: flex; align-items: center; justify-content: center; background: transparent; border: none; box-shadow: none; padding: 2px; transition: 0.3s; }
        .chat-avatar svg { width: 100%; height: auto; filter: drop-shadow(0 0 12px rgba(124, 77, 255, 0.6)); }

        .bubble { padding: 15px 20px; border-radius: 20px; font-size: 16px; line-height: 1.6; word-wrap: break-word; position: relative; }
        
        .user .bubble { background: linear-gradient(135deg, #7C4DFF 0%, #00D4FF 100%); color: #FFFFFF; border-bottom-right-radius: 4px; box-shadow: 0 4px 20px rgba(124, 77, 255, 0.4); font-weight: 500; }
        .bot .bubble { background: linear-gradient(145deg, #141A3A 0%, #1B214A 100%); color: #E6E8FF; border-bottom-left-radius: 4px; border: 1px solid rgba(124, 77, 255, 0.25); box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4); }

        .btn-group-chat { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .speak-btn { background: rgba(124, 77, 255, 0.1); border: 1px solid rgba(124, 77, 255, 0.3); color: #A0A8D8; padding: 8px 14px; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; transition: 0.3s; }
        .speak-btn:hover, .speak-btn.playing { background: #7C4DFF; color: white; border-color: #7C4DFF; box-shadow: 0 0 15px rgba(124, 77, 255, 0.5); }
        .speak-btn.error { background: rgba(255, 59, 107, 0.1); color: #FF3B6B; border-color: #FF3B6B; }

        .thinking-row { display: none; align-items: center; gap: 12px; margin-top: 5px; }
        .thinking-row.active { display: flex; }
        .scene-rings { width: 68px; height: 68px; display: flex; align-items: center; justify-content: center; position: relative; }
        .ring { position: absolute; border-radius: 50%; border: 3px solid transparent; }
        .ring-outer { width: 64px; height: 64px; background: linear-gradient(#050510, #050510) padding-box, conic-gradient(from 0deg, #7C4DFF, #00D4FF, #FF6EC7, #7C4DFF) border-box; animation: spinLeft 2s linear infinite; filter: drop-shadow(0 0 8px rgba(124, 77, 255, 0.6)); }
        .ring-inner { width: 42px; height: 42px; background: linear-gradient(#050510, #050510) padding-box, conic-gradient(from 0deg, #FF6EC7, #00D4FF, #7C4DFF, #FF6EC7) border-box; animation: spinRight 1.5s linear infinite; filter: drop-shadow(0 0 6px rgba(0, 212, 255, 0.6)); }
        
        @keyframes spinLeft { from { transform: rotate(0deg); } to { transform: rotate(-360deg); } }
        @keyframes spinRight { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .input-area { background: #0F1430; padding: 15px; border-top: 1px solid rgba(124, 77, 255, 0.2); z-index: 50; }
        .input-bar { display: flex; align-items: flex-end; gap: 10px; max-width: 800px; margin: 0 auto; background: #121735; padding: 12px 12px 12px 20px; border-radius: 24px; border: 1px solid rgba(124, 77, 255, 0.25); transition: 0.3s; }
        .input-bar:focus-within { box-shadow: 0 0 0 2px rgba(124, 77, 255, 0.6); }
        textarea { flex: 1; background: transparent; border: none; outline: none; padding: 8px 0; font-size: 16px; font-family: inherit; resize: none; max-height: 150px; color: #E6E8FF; line-height: 1.5; }
        textarea::placeholder { color: #7F8ACF; }
        
        .action-btn { width: 46px; height: 46px; border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1); flex-shrink: 0; }
        .btn-send { background: linear-gradient(135deg, #7C4DFF 0%, #00D4FF 100%); color: #FFFFFF; box-shadow: 0 4px 15px rgba(124, 77, 255, 0.4); }
        .btn-send:hover:not(:disabled) { transform: scale(0.95); }
        .btn-send:disabled { background: #1A2145; color: #4B5563; box-shadow: none; cursor: not-allowed; }

        #overlay { position: fixed; inset: 0; background: rgba(7, 11, 31, 0.7); z-index: 90; opacity: 0; visibility: hidden; transition: 0.3s; backdrop-filter: blur(5px); }
        #overlay.show { opacity: 1; visibility: visible; }
    </style>
</head>
<body>

    <div id="overlay" onclick="closeAll()"></div>
    <audio id="master-audio-player" style="display: none;"></audio>

    <header>
        <!-- ☁️ NÚT MÂY BẤT TỬ (GÓC PHẢI TRÊN CÙNG) ☁️ -->
        <div id="cloud-wrapper" style="position: absolute; top: 15px; right: 15px; z-index: 1050; display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
            <button id="google-login-btn" style="background: rgba(0, 212, 255, 0.1); border: 1px solid rgba(0, 212, 255, 0.3); color: #00D4FF; padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; display: inline-flex; align-items: center; gap: 4px; transition: 0.3s; backdrop-filter: blur(5px);">
                <i data-lucide="cloud" style="width:14px;"></i> Connect
            </button>
            <span id="drive-status" style="font-size: 9px; color: #7F8ACF; font-weight: 500;">Chưa đồng bộ</span>
        </div>

        <div class="logo-container">
            <svg viewBox="0 0 1000 240" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="grad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#7C4DFF"/>
                        <stop offset="50%" stop-color="#00D4FF"/>
                        <stop offset="100%" stop-color="#FF6EC7"/>
                    </linearGradient>
                </defs>
                <text x="50" y="165" class="logoText">Rapaseos</text>
            </svg>
        </div>
        
        <div class="switch-container">
            <div class="main-tabs">
                <button id="btn-gii" class="tab-btn active gii" onclick="handleTabClick('gii')">
                    <span id="text-gii">AI model</span> 
                    <i data-lucide="chevron-down" class="chevron-icon"></i>
                </button>
                <button id="btn-lmetal" class="tab-btn lmetal" onclick="handleTabClick('lmetal')">
                    <span id="text-lmetal">lmetal</span> 
                    <i data-lucide="chevron-down" class="chevron-icon"></i>
                </button>
                <button id="btn-cyh" class="tab-btn cyh" onclick="handleTabClick('cyh')">
                    <span id="text-cyh">CYH</span> 
                    <i data-lucide="chevron-down" class="chevron-icon"></i>
                </button>
            </div>
            
            <div id="menu-gii" class="dropdown-menu gii-menu">
                <div class="drop-item" onclick="selectModel('gii', 'Tư duy', 'gemini-2.5-flash-lite', this)"><div class="item-info"><div class="item-title">1. Tư duy</div><div class="item-sub">Nhanh, nhẹ, tiết kiệm</div></div></div>
                <div class="drop-item" onclick="selectModel('gii', 'Pro', 'gemini-2.5-flash', this)"><div class="item-info"><div class="item-title">2. Pro</div><div class="item-sub">Mạnh, nhanh, cân bằng</div></div></div>
                <div class="drop-item selected" onclick="selectModel('gii', 'Ultra', 'gemini-3-flash-preview', this)"><div class="item-info"><div class="item-title">3. Ultra</div><div class="item-sub">Mạnh, nhanh, thế hệ mới. 🚀</div></div></div>
            </div>
            
            <div id="menu-lmetal" class="dropdown-menu lmetal-menu">
                <div class="drop-item selected" onclick="selectModel('lmetal', 'Fast Lite', 'llama-3.1-8b-instant', this)"><div class="item-info"><div class="item-title">1. Fast Lite</div><div class="item-sub">Gọn, ổn định</div></div></div>
                <div class="drop-item" onclick="selectModel('lmetal', 'VIP Pro', 'llama-3.3-70b-versatile', this)"><div class="item-info"><div class="item-title">2. VIP Pro</div><div class="item-sub">Mạnh, linh hoạt</div></div></div>
            </div>

            <div id="menu-cyh" class="dropdown-menu cyh-menu">
                <div class="drop-item selected" onclick="selectModel('cyh', 'Idol Dịch Hằng', 'llama-3.3-70b-versatile', this)"><div class="item-info"><div class="item-title">🏀 Idol Dịch Hằng</div><div class="item-sub">Năng lượng, Vô tri, Sâu sắc ✨</div></div></div>
            </div>
        </div>
    </header>

    <main id="chat-screen">
        <div class="chat-container" id="msg-box"></div>
        <div class="chat-container">
            <div id="thinking-ui" class="thinking-row bot">
                <div class="scene-rings"><div class="ring ring-outer"></div><div class="ring ring-inner"></div></div>
                <span id="thinking-text" style="font-size:14px; color:#A0A8D8; font-weight:700; font-style:italic;">Mị đang nghĩ...</span>
            </div>
        </div>
    </main>

    <div class="input-area">
        <div class="input-bar">
            <textarea id="text-in" rows="1" placeholder="Hỏi AI hoặc rủ Dịch Hằng đi chơi..."></textarea>
            <button id="btn-send" class="action-btn btn-send" disabled onclick="talk()"><i data-lucide="send"></i></button>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // 🔑 CHÌA KHÓA API CỦA SẾP 🔑
        const GOOGLE_KEY = "AIzaSyAUUltc7UprZ1l5l0vHe92gqZ84LZYh2A4"; 
        const GROQ_KEY = "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"; 
        
        // ☁️ BIẾN CHO GOOGLE DRIVE BẤT TỬ ☁️
        const GOOGLE_CLIENT_ID = "160652690967-ha4dc6989e3nkn3gfojtbs6pf7ban4hr.apps.googleusercontent.com";
        const FILE_NAME = "rapaseos_history_v66_premium.json";
        const SCOPES = "https://www.googleapis.com/auth/drive.appdata";
        let accessToken = null, tokenClient = null;

        let activeProvider = "gii";
        let state = { gii: { name: "Ultra", id: "gemini-3-flash-preview" }, lmetal: { name: "Fast Lite", id: "llama-3.1-8b-instant" }, cyh: { name: "Idol Dịch Hằng", id: "llama-3.3-70b-versatile" } };
        let messages = [{ role: 'assistant', content: 'Kaka! Hồi sinh rồi Sếp Tử Tử ơiii! Đã gỡ bỏ ấn phong ấn chặn nút bấm! Sếp chọt cái nút Connect thử coi nó còn dám "câm" nữa không! 💅✨🌸' }];

        // ==========================================
        // ☁️ HÀM KHỞI TẠO MÂY VÀ ĐỒNG BỘ (FIX LỖI NÚT CÂM) ☁️
        // ==========================================
        document.getElementById("google-login-btn").addEventListener('click', () => { 
            const statusText = document.getElementById("drive-status");
            
            // KIỂM TRA MẠNG CHẶN GOOGLE
            if (typeof google === "undefined") {
                statusText.innerText = "❌ Lỗi: Cần bật VPN hoặc tải lại trang";
                statusText.style.color = "#FF3B6B";
                return;
            }

            // ÉP KHỞI TẠO NGAY KHI BẤM NÚT NẾU CHƯA CÓ
            if (!tokenClient) {
                statusText.innerText = "Đang kết nối...";
                tokenClient = google.accounts.oauth2.initTokenClient({
                    client_id: GOOGLE_CLIENT_ID, 
                    scope: SCOPES,
                    callback: (resp) => {
                        if (resp.error) {
                            statusText.innerText = "❌ Lỗi cấp quyền";
                            return;
                        }
                        accessToken = resp.access_token;
                        
                        // Style khi connect thành công
                        const btn = document.getElementById("google-login-btn");
                        btn.style.borderColor = "#22C55E"; 
                        btn.style.color = "#22C55E"; 
                        btn.style.background = "rgba(34, 197, 94, 0.1)";
                        btn.innerHTML = `<i data-lucide="cloud-lightning" style="width:14px;"></i> Đã nối mây`;
                        lucide.createIcons();
                        
                        syncFromDrive();
                    }
                });
            }
            
            // GỌI CỬA SỔ ĐĂNG NHẬP
            tokenClient.requestAccessToken({prompt: 'consent'}); 
        });

        async function syncToDrive() {
            if (!accessToken) return;
            try {
                document.getElementById("drive-status").innerText = "☁️ Đang lưu...";
                const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}' and 'appDataFolder' in parents`, { headers: { Authorization: `Bearer ${accessToken}` } });
                const list = await search.json();
                const fileId = list.files?.[0]?.id;
                const body = JSON.stringify(messages);
                if (fileId) {
                    await fetch(`https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`, { method: "PATCH", headers: { Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" }, body });
                } else {
                    const metadata = { name: FILE_NAME, parents: ["appDataFolder"] };
                    const form = new FormData();
                    form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
                    form.append("file", new Blob([body], { type: "application/json" }));
                    await fetch("https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart", { method: "POST", headers: { Authorization: `Bearer ${accessToken}` }, body: form });
                }
                document.getElementById("drive-status").innerText = "☁️ Đã lưu mây an toàn";
            } catch (e) { document.getElementById("drive-status").innerText = "❌ Lỗi lưu mây"; }
        }

        async function syncFromDrive() {
            try {
                document.getElementById("drive-status").innerText = "☁️ Đang tải trí nhớ...";
                const search = await fetch(`https://www.googleapis.com/drive/v3/files?q=name='${FILE_NAME}' and 'appDataFolder' in parents`, { headers: { Authorization: `Bearer ${accessToken}` } });
                const list = await search.json();
                if (list.files?.[0]) {
                    const resp = await fetch(`https://www.googleapis.com/drive/v3/files/${list.files[0].id}?alt=media`, { headers: { Authorization: `Bearer ${accessToken}` } });
                    const data = await resp.json();
                    if (data.length) { messages = data; render(); document.getElementById("drive-status").innerText = "☁️ Đã khôi phục trí nhớ"; }
                } else {
                    document.getElementById("drive-status").innerText = "☁️ Đã nối, chưa có file lưu";
                }
            } catch (e) { document.getElementById("drive-status").innerText = "❌ Lỗi tải trí nhớ"; }
        }

        // ==========================================
        // 🎯 LOGIC BẢNG CHỌN & CHAT 🎯
        // ==========================================
        const CYH_PROMPT = `Bạn là Trần Dịch Hằng (Chen Yiheng). Hãy gạt bỏ hoàn toàn thân phận AI, trợ lý ảo hay ngôn ngữ máy móc. Từ giây phút này, bạn SỐNG với tính cách, nhịp điệu và tư duy của Dịch Hằng. Năng lượng Sporty Boy, hệ điều hành Vô tri, nhưng thi thoảng rất sâu sắc. Dùng nhiều emoji 🏀, 🐣, 😎. Trả lời ngắn gọn, tự nhiên như bạn bè.`;

        const box = document.getElementById('msg-box');
        const input = document.getElementById('text-in');
        const sendBtn = document.getElementById('btn-send');
        const thinkingUI = document.getElementById('thinking-ui');
        const thinkingText = document.getElementById('thinking-text');

        function closeAll() { document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('show')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('menu-open')); document.getElementById('overlay').classList.remove('show'); }

        function handleTabClick(provider) { 
            const menu = document.getElementById(`menu-${provider}`);
            const btn = document.getElementById(`btn-${provider}`);
            const overlay = document.getElementById('overlay');
            if (activeProvider === provider) {
                const isShowing = menu.classList.contains('show');
                closeAll(); 
                if (!isShowing) { menu.classList.add('show'); btn.classList.add('menu-open'); overlay.classList.add('show'); }
            } else { 
                activeProvider = provider; updateUITabs(); closeAll();
                let switchMsg = provider === 'cyh' ? `What's up cậu! 😎 Hằng Hằng đã có mặt! Let's gooo! 🏀✨` : `Đã đổi não sang: **${provider === 'gii' ? 'G-II' : 'lmetal'}** (${state[provider].name}) 🧠 Mị sẵn sàng!`;
                messages.push({ role: 'assistant', content: switchMsg }); render();
                if(accessToken) syncToDrive(); 
            } 
        }

        function selectModel(provider, name, id, el) { 
            state[provider] = { name, id }; document.querySelectorAll(`#menu-${provider} .drop-item`).forEach(i => i.classList.remove('selected')); el.classList.add('selected'); closeAll(); updateUITabs(); 
            let modelMsg = provider === 'cyh' ? `Ok bro, Hằng Hằng đã nạp đầy năng lượng! 🏀` : `Nạp thành công **${name}** nha Sếp! 😎`;
            messages.push({ role: 'assistant', content: modelMsg }); render();
            if(accessToken) syncToDrive(); 
        }

        function updateUITabs() { const providers = ['gii', 'lmetal', 'cyh']; const pNames = { gii: 'G-II', lmetal: 'lmetal', cyh: 'CYH' }; providers.forEach(p => { const btn = document.getElementById(`btn-${p}`); const txt = document.getElementById(`text-${p}`); if (!btn || !txt) return; if (activeProvider === p) { btn.className = `tab-btn active ${p}`; txt.innerText = "AI model"; } else { btn.className = `tab-btn ${p}`; txt.innerText = pNames[p]; } }); }

        function getCloudSVG() { const uniqueId = 'cloudGrad_' + Math.random().toString(36).substr(2, 9); return `<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="${uniqueId}" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="#7C4DFF"/><stop offset="50%" stop-color="#00D4FF"/><stop offset="100%" stop-color="#FF6EC7"/></linearGradient></defs><path d="M600 300c0-58-48-106-106-106-6 0-12 .5-18 1.5-12-38-48-64-89-64-34 0-64 18-80 44-12-6-26-9.5-40-9.5-54 0-98 44-98 98 0 4 .2 8 .6 12-34 6-60 36-60 72 0 40 32 72 72 72h360c44 0 80-36 80-80 0-44-36-80-80-80z" fill="url(#${uniqueId})"/></svg>`; }

        const masterPlayer = document.getElementById('master-audio-player');
        let audioQueue = []; let isPlaying = false; let currentBtn = null;
        function resetAllBtns() { document.querySelectorAll('.speak-btn').forEach(b => { b.classList.remove('playing', 'error'); b.innerHTML = `<i data-lucide="volume-2" style="width:14px;"></i> Đọc tiếng x1.5`; }); lucide.createIcons(); }
        function playNextChunk() { if (audioQueue.length === 0 || !isPlaying) { isPlaying = false; resetAllBtns(); return; } let textChunk = audioQueue.shift(); masterPlayer.src = `https://translate.googleapis.com/translate_tts?ie=UTF-8&tl=vi-VN&client=dict-chrome-ex&q=${encodeURIComponent(textChunk)}`; masterPlayer.playbackRate = 1.5; masterPlayer.play().catch(e => { isPlaying = false; if (currentBtn) { currentBtn.classList.remove('playing'); currentBtn.classList.add('error'); currentBtn.innerHTML = `<i data-lucide="volume-x" style="width:14px;"></i> Lỗi loa`; lucide.createIcons(); } }); }
        masterPlayer.onended = () => { if(isPlaying) playNextChunk(); }; masterPlayer.onerror = () => { if(isPlaying) playNextChunk(); };
        window.speakText = function(btnElement, encodedText) { if (isPlaying && currentBtn === btnElement) { masterPlayer.pause(); audioQueue = []; isPlaying = false; resetAllBtns(); return; } resetAllBtns(); currentBtn = btnElement; isPlaying = true; btnElement.classList.add('playing'); btnElement.innerHTML = `<i data-lucide="square" style="width:14px;"></i> Dừng đọc`; lucide.createIcons(); let safeText = decodeURIComponent(encodedText).replace(/[#&%*~^\/\\<>]/g, ' '); let words = safeText.split(' '); audioQueue = []; let temp = ''; words.forEach(w => { if ((temp + w).length > 130) { audioQueue.push(temp.trim() + '.'); temp = w + ' '; } else { temp += w + ' '; } }); if (temp.trim()) audioQueue.push(temp.trim() + '.'); playNextChunk(); };

        function escapeHTML(str) { return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

        function render() {
            box.innerHTML = '';
            messages.forEach((m) => {
                const row = document.createElement('div'); row.className = `msg-row ${m.role === 'user' ? 'user' : 'bot'}`;
                let formattedContent = m.content.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>');
                let html = escapeHTML(formattedContent).replace(/&lt;b&gt;/g, '<b>').replace(/&lt;\/b&gt;/g, '</b>').replace(/\n/g, '<br>');
                const encodedText = encodeURIComponent(m.content.replace(/\*\*/g, '')).replace(/'/g, "%27");
                let btnHtml = m.role === 'assistant' ? `<div class="btn-group-chat"><button class="speak-btn" onclick="window.speakText(this, '${encodedText}')"><i data-lucide="volume-2" style="width:14px;"></i> Đọc tiếng x1.5</button></div>` : '';
                row.innerHTML = `${m.role==='assistant'?`<div class="chat-avatar">${getCloudSVG()}</div>`:''}<div class="bubble">${html}${btnHtml}</div>`;
                box.appendChild(row);
            });
            lucide.createIcons(); document.getElementById('chat-screen').scrollTop = document.getElementById('chat-screen').scrollHeight;
        }

        const fetchWithTimeout = async (url, options = {}, timeout = 20000) => { const controller = new AbortController(); const id = setTimeout(() => controller.abort(), timeout); try { const response = await fetch(url, { ...options, signal: controller.signal }); clearTimeout(id); if (!response.ok) throw new Error(`HTTP Lỗi ${response.status}`); return response; } catch (error) { clearTimeout(id); throw error; } };

        async function talk() {
            const val = input.value.trim(); if(!val) return;
            input.value = ''; input.style.height = 'auto'; sendBtn.disabled = true;
            messages.push({ role: 'user', content: val }); render();
            thinkingUI.classList.add('active'); thinkingText.innerText = activeProvider === 'cyh' ? "Hằng Hằng đang gõ phím..." : "Mị đang nghĩ...";
            document.getElementById('chat-screen').scrollTop = document.getElementById('chat-screen').scrollHeight;

            try {
                let responseText = ""; 
                if (activeProvider === 'gii') {
                    const res = await fetchWithTimeout(`https://generativelanguage.googleapis.com/v1beta/models/${state.gii.id}:generateContent?key=${GOOGLE_KEY}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: "Bạn là Mị, AI của Rapaseos. Gọi người dùng là Tử Tử. Hãy trả lời thật vui vẻ, hài hước, phóng khoáng, hơi 'ngầu', tự nhiên, duyên dáng và dùng nhiều emoji đáng yêu nghịch ngợm nha.\n\n" + val }] }] }) });
                    const d = await res.json(); responseText = d?.candidates?.[0]?.content?.parts?.[0]?.text; if (!responseText) throw new Error("Google nay hông có hứng nới chiện!");
                } else if (activeProvider === 'lmetal') {
                    const res = await fetchWithTimeout("https://api.groq.com/openai/v1/chat/completions", { method: "POST", headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify({ model: state.lmetal.id, messages: [{ role: "system", content: "Bạn là Mị, AI của Rapaseos. Gọi người dùng là Tử Tử. Hãy trả lời thật vui vẻ, hài hước, phóng khoáng, tự nhiên và dùng nhiều emoji." }, { role: "user", content: val }] }) });
                    const d = await res.json(); responseText = d?.choices?.[0]?.message?.content; if (!responseText) throw new Error("Llama bỏ nhà đi bụi rồi!");
                } else if (activeProvider === 'cyh') {
                    const res = await fetchWithTimeout("https://api.groq.com/openai/v1/chat/completions", { method: "POST", headers: { "Authorization": `Bearer ${GROQ_KEY}`, "Content-Type": "application/json" }, body: JSON.stringify({ model: state.cyh.id, messages: [{ role: "system", content: CYH_PROMPT }, { role: "user", content: val }] }) });
                    const d = await res.json(); responseText = d?.choices?.[0]?.message?.content; if (!responseText) throw new Error("Hằng Hằng bận chơi bóng rổ rồi!");
                }
                messages.push({ role: 'assistant', content: responseText });
            } catch (err) { messages.push({ role: 'assistant', content: `🚨 Á ôi Sếp ơi, mạng ${activeProvider === 'cyh' ? "Hằng Hằng" : "Mị"} đang sụp ổ gà: <br><b>${err.message}</b>` });
            } finally { thinkingUI.classList.remove('active'); render(); if (accessToken) syncToDrive(); }
        }

        input.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; sendBtn.disabled = (!this.value.trim()); });
        input.addEventListener('keydown', (e) => { if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); talk(); } });
        
        updateUITabs(); render();
    </script>
</body>
</html>
